name: CI/CD Pipeline - E-Commerce Platform

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - prod
      action:
        description: 'Action'
        required: true
        type: choice
        options:
          - deploy-all
          - deploy-infra-only
          - destroy
          - build-only

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  # Build & Push (Skip on destroy)
  build-and-push:
    name: Build & Push Images
    if: inputs.action != 'destroy'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - product-service
          - cart-service
          - user-service
          - order-service
          - shipping-service
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Create ECR Repo
        run: |
          aws ecr describe-repositories --repository-names ecommerce/${{ matrix.service }} --region $AWS_REGION 2>/dev/null || \
            aws ecr create-repository --repository-name ecommerce/${{ matrix.service }} --region $AWS_REGION
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ env.ECR_REGISTRY }}/ecommerce/${{ matrix.service }}:latest

  # Package Lambda (Skip on destroy)
  package-lambda:
    name: Package Lambda
    if: inputs.action != 'destroy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package
        run: |
          cd lambda/order-shipment-processor
          zip -r ../../shipping-processor.zip lambda_function.py
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-zip
          path: shipping-processor.zip
          retention-days: 1

  # Terraform (Always runs for deploy/destroy)
  terraform:
    name: Terraform - ${{ inputs.environment }}
    needs: [build-and-push, package-lambda]
    if: inputs.action != 'build-only'
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Download Lambda (skip on destroy)
      - name: Download Lambda
        if: inputs.action != 'destroy'
        uses: actions/download-artifact@v4
        with:
          name: lambda-zip
          path: terraform/modules/lambda/

      - name: Empty S3 Bucket
        if: inputs.action == 'destroy'
        run: |
          cd terraform/environments/${{ inputs.environment }}
          terraform init -reconfigure -backend-config="key=${{ inputs.environment }}/terraform.tfstate" > /dev/null 2>&1
          BUCKET=$(terraform output -raw frontend_bucket 2>/dev/null || echo "")
          if [ -n "$BUCKET" ] && [ "$BUCKET" != "None" ]; then
            echo "Emptying: $BUCKET"
            aws s3 rm "s3://${BUCKET}" --recursive --region $AWS_REGION || true
          fi

      - name: Create tfvars
        run: |
          cat > terraform/environments/${{ inputs.environment }}/terraform.auto.tfvars << EOF
          admin_email = "${{ secrets.ADMIN_EMAIL }}"
          domain_name = "${{ secrets.DOMAIN_NAME }}"
          acm_certificate_arn = "${{ secrets.ACM_CERT_ARN }}"
          environment = "${{ inputs.environment }}"
          aws_region = "us-east-1"
          project_name = "ecommerce"
          time_period_start = "2026-06-01_00:00"
          EOF

      - name: Terraform ${{ inputs.action == 'destroy' && 'Destroy' || 'Apply' }}
        run: |
          cd terraform/environments/${{ inputs.environment }}
          terraform init -reconfigure \
            -backend-config="bucket=ecommerce-terraform-state-cloudnerd" \
            -backend-config="key=${{ inputs.environment }}/terraform.tfstate" \
            -backend-config="region=us-east-1"

          if [ "${{ inputs.action }}" = "destroy" ]; then
            terraform destroy -auto-approve
          else
            terraform apply -auto-approve
          fi

  # Deploy Frontend (Only on deploy-all)
  deploy-frontend:
    name: Deploy Frontend
    needs: terraform
    if: inputs.action == 'deploy-all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create Frontend .env
        run: |
          USER_POOL_ID=$(aws ssm get-parameter --name "/ecommerce/${{ inputs.environment }}/cognito/user-pool-id" --region $AWS_REGION --query 'Parameter.Value' --output text)
          CLIENT_ID=$(aws ssm get-parameter --name "/ecommerce/${{ inputs.environment }}/cognito/client-id" --region $AWS_REGION --query 'Parameter.Value' --output text)
          API_URL=$(aws ssm get-parameter --name "/ecommerce/${{ inputs.environment }}/api-url" --region $AWS_REGION --query 'Parameter.Value' --output text)
          cat > frontend/react-vite-app/.env << EOF
          VITE_COGNITO_USER_POOL_ID=${USER_POOL_ID}
          VITE_COGNITO_USER_POOL_CLIENT_ID=${CLIENT_ID}
          VITE_API_BASE_URL=${API_URL}
          EOF
          echo ".env created!"

      - name: Build & Deploy
        run: |
          # Build frontend
          cd frontend/react-vite-app
          npm ci
          npm run build
          
          # Get S3 bucket from Terraform
          cd ../../terraform/environments/${{ inputs.environment }}
          terraform init -reconfigure -backend-config="key=${{ inputs.environment }}/terraform.tfstate" > /dev/null 2>&1
          BUCKET=$(terraform output -raw frontend_bucket)
          CF_ID=$(terraform output -raw cloudfront_id)
          
          # Deploy to S3
          cd ../../../frontend/react-vite-app
          aws s3 sync dist/ "s3://${BUCKET}/" --delete --exclude "images/*" --region $AWS_REGION
          
          # Invalidate CloudFront
          aws cloudfront create-invalidation --distribution-id "$CF_ID" --paths "/*" --region $AWS_REGION
          
          echo "Frontend deployed!"

  # Seed Product Data (Only on deploy-all)
  seed-data:
    name: Seed Product Data
    needs: terraform
    if: inputs.action == 'deploy-all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Upload Images to S3
        run: |
          cd data
          bash upload-images-to-s3.sh ${{ inputs.environment }} $AWS_REGION
      - name: Update Image URLs
        run: |
          cd data
          bash update-product-image-urls.sh ${{ inputs.environment }} $AWS_REGION
      - name: Load Products into DynamoDB
        run: |
          cd data
          bash load-products.sh ${{ inputs.environment }} $AWS_REGION
